<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Contact Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <span class="header-title">Simple Contact Manager</span>
  </header>

  <main class="container">
    <section class="card">
      <h2 id="form-title">Add Contact</h2>
      <form id="contact-form">
        <input type="hidden" id="contact-id" />

        <div class="form-grid">
          <div class="form-field">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input id="firstName" type="text" placeholder="Jane" required />
          </div>
          <div class="form-field">
            <label for="lastName">Last Name <span class="required">*</span></label>
            <input id="lastName" type="text" placeholder="Smith" required />
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="jane@example.com" />
          </div>
          <div class="form-field">
            <label for="phone">Phone</label>
            <input id="phone" type="text" placeholder="+1 (555) 000-0000" />
          </div>
        </div>

        <div class="button-row">
          <button type="submit" id="submit-btn" class="btn btn-primary">Save Contact</button>
          <button type="button" id="cancel-edit" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Contacts</h2>
      <p id="empty-state" class="empty-state" hidden>No contacts yet. Add one above.</p>
      <table id="contacts-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="contacts-body"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
